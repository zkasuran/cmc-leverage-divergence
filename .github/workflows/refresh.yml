name: Refresh data + frontend

# Every 4 hours (at :17 to avoid the on-the-hour stampede), plus manual trigger.
on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci || npm install

      - name: Refresh CMC20 universe + live CMC reading + frontend
        run: |
          npm run refresh-universe
          npm run fetch-cmc20-hist
          npm run fetch-overlay-funding || {
            echo "::warning title=funding refresh skipped::fetch-overlay-funding got no data (Binance fapi.binance.com returns HTTP 451, geo-blocked from the runner). Keeping the committed cmc20-basket-funding.json. Refresh funding from a non-blocked IP (local) instead.";
          }
          npm run cmc20
          npm run build-readme
          npm run spec:live || {
            echo "::warning title=live CMC read failed::spec:live did not complete, so the decision chain got no new entry. Falling back to the offline spec to keep the frontend fresh. Investigate the CMC fetch.";
            npm run spec;
          }
          npm run build-frontend

      - name: Verify headline numbers still reproduce
        run: npm run verify

      - name: Verify the decision-provenance chain re-derives from its inputs
        run: npm run verify:chain

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cmc20-hist.json data/cmc20-basket-funding.json data/cmc20-universe.json reports/cmc20-overlay.json reports/latest-spec.json reports/live-spec.json reports/live-chain.jsonl skills/cmc-leverage-divergence/references/live-spec-example.json README.md index.html demo/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-refresh CMC20 universe + live CMC spec + frontend [skip ci]"
            git push
          fi
